<!DOCTYPE html>
<html>
  <style>
    body {
      margin-left: 20%;
      margin-right: 20%;
      padding: 0;
      background-color: #ffffff;
    }
    h1 {
      font-size: 200%;
      margin-top: 30px;
      font-family: "Montserrat", sans-serif;
      width: 100%;
      text-align: center;
    }
    h2 {
      margin-top: 30px;
      font-family: "Montserrat", sans-serif;
      width: 100%;
      text-align: center;
    }
    h3 {
      margin-top: 30px;
      font-family: "Montserrat", sans-serif;
      width: 100%;
      text-align: center;
    }
    .grid-container {
      display: grid;
      grid-column-gap: 50px;
      grid-row-gap: 50px;
      grid-template-columns: auto auto auto;
    }
    .grid-item {
      background-color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.8);
      padding: 20px;
      font-size: 30px;
      text-align: center;
      
    }
    .item {
      float: left;
      font-size: 16px;
      padding: 0.8%;
      width:33%;
    }
    .item-image {
      object-fit: cover;
    }
    .item:hover {
      cursor: pointer;
    }
  </style>
  <body>
    <h1>High School was Pretty Poggers</h1>
    <h3>Some photos throughout the year</h3>
    <h3>Will be added later</h3>
    <div class="grid-container">
      <div class="grid-item">1</div>
      <div class="grid-item">2</div>
      <div class="grid-item">3</div>
      <div class="grid-item">4</div>
      <div class="grid-item">5</div>
      <div class="grid-item">6</div>
      <div class="grid-item">7</div>
      <div class="grid-item">8</div>
      <div class="grid-item">9</div>
    </div>
  </body>
</html>
